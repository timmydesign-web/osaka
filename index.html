<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>大阪京都旅行 - 2026</title>

    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="關西行">
    <meta name="theme-color" content="#ff9a9e">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>大阪京都旅行</h1>
        <p class="subtitle">8/10~8/17 | 8天7夜</p>
    </header>

    <main>
        <nav>
            <div class="nav-container">
                <button class="nav-btn" onclick="openModal('day1', event)">Day 1</button>
                <button class="nav-btn" onclick="openModal('day2', event)">Day 2</button>
                <button class="nav-btn" onclick="openModal('day3', event)">Day 3</button>
                <button class="nav-btn" onclick="openModal('day4', event)">Day 4</button>
                <button class="nav-btn" onclick="openModal('day5', event)">Day 5</button>
                <button class="nav-btn" onclick="openModal('day6', event)">Day 6</button>
                <button class="nav-btn" onclick="openModal('day7', event)">Day 7</button>
                <button class="nav-btn" onclick="openModal('day8', event)">Day 8</button>
            </div>
        </nav>

        <section class="weather-widget">
            <div class="weather-header">
                <div class="weather-left">
                    <h2 class="city-name" id="location-name">📍 定位中...</h2>
                    <span class="weather-subtitle serif">未來 24 小時預報</span>
                </div>
                <div class="weather-right">
                    <h3 id="current-weather-desc" class="serif">同步中...</h3>
                </div>
            </div>
            <div class="hourly-forecast" id="hourly-forecast"></div>
        </section>

        <section class="hero">
            <div class="hero-card preview-card-content">
                <div class="preview-middle">
                    <span class="current-time serif" id="preview-now-time">--:--</span>
                    <span class="activity-title" id="preview-now-title">讀取行程中...</span>
                    <div class="next-activity-row">
                        <span class="next-activity-arrow">→</span>
                        <span class="next-activity-text" id="preview-next-title">準備出發</span>
                    </div>
                </div>
                <div class="preview-right">
                    <span class="clock-icon">🕒</span>
                    <span class="next-time serif" id="preview-next-time">--:--</span>
                    <span class="next-label">下個時間</span>
                </div>
            </div>
        </section>

        <div id="itineraryModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="close-btn" onclick="closeModal()">×</div>
                <div id="modalBody"></div>
            </div>
        </div>

        <div id="data-source" style="display:none;">
            <div id="content-day1">
                <div class="ios-modal-header"><h2>Day 1: 台北 ✈️ 大阪</h2></div>
                <div class="itinerary-card">
                    <div class="time-item" data-time="19:00"><span class="time">19:00</span><span>抵達關西機場 (KIX) - IT212</span></div>
                    <div class="time-item" data-time="20:10"><span class="time">20:10</span><span>入境與提領行李 (預估)</span></div>
                    <div class="time-item highlight" data-time="20:35"><span class="time">20:35</span><span>搭乘南海電鐵 Rapi:t β
