</head>
<body>
    <header>
        <div class="header-content">
            <h1>🌸 大阪京都之旅</h1>
            <p>2026.08.10 - 08.17 關西全攻略</p>
        </div>
        <nav>
            <ul>
                <li><button class="nav-btn" onclick="openModal('day1')">Day 1</button></li>
                <li><button class="nav-btn" onclick="openModal('day2')">Day 2</button></li>
                <li><button class="nav-btn" onclick="openModal('day3')">Day 3</button></li>
                <li><button class="nav-btn" onclick="openModal('day4')">Day 4</button></li>
                <li><button class="nav-btn" onclick="openModal('day5')">Day 5</button></li>

            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-card">
                <h2>歡迎來到關西！</h2>
                <p>準備好體驗大阪的熱情奔放與京都的靜謐優雅了嗎？</p>
                <div class="status-badge">預計 8 月出發</div>
            </div>
        </section>

        <div id="itineraryModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal()">&times;</span>
                <div id="modalBody"></div>
            </div>
        </div>

        <div id="data-source" style="display:none;">
            <div id="content-day1">
                <h2>🗓️ 第一天：大阪抵達</h2>
                <ul class="itinerary-list">
                    <li><strong>上午：</strong> 抵達關西機場 (KIX)，搭乘南海電鐵。</li>
                    <li><strong>下午：</strong> 飯店 Check-in，前往心齋橋。</li>
                    <li><strong>晚餐：</strong> 道頓堀章魚燒、拉麵巡禮。</li>
                </ul>
            </div>
            <div id="content-day2">
                <h2>🎢 第二天：環球影城</h2>
                <p>全日攻略日本環球影城 (USJ)，瑪利歐、哈利波特園區重點必去！</p>
            </div>
            </div>
    </main>
